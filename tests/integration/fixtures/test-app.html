<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>ResumeWright 测试应用</title>
  <style>
    body { font-family: sans-serif; padding: 40px; max-width: 600px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; margin-bottom: 4px; font-weight: bold; }
    input, textarea { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
    button { padding: 10px 24px; background: #4f46e5; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #4338ca; }
    #result { margin-top: 20px; padding: 12px; border-radius: 4px; display: none; }
    #result.success { background: #d1fae5; color: #065f46; border: 1px solid #6ee7b7; }
    #result.error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .status-badge { display: inline-block; padding: 4px 12px; border-radius: 12px; font-size: 12px; }
    .status-badge.pending { background: #fef3c7; color: #92400e; }
    .status-badge.approved { background: #d1fae5; color: #065f46; }
    #workflow-status { data-state: "pending"; }
    .checkbox-group { display: flex; align-items: center; gap: 8px; }
    .checkbox-group input { width: auto; }
  </style>
</head>
<body>
  <h1>工作流申请表单</h1>

  <div id="form-section">
    <div class="form-group">
      <label for="title-input">申请标题</label>
      <input id="title-input" type="text" data-testid="title-input" placeholder="请输入申请标题">
    </div>

    <div class="form-group">
      <label for="amount-input">申请金额</label>
      <input id="amount-input" type="number" data-testid="amount-input" placeholder="请输入金额">
    </div>

    <div class="form-group">
      <label for="reason-input">申请原因</label>
      <textarea id="reason-input" data-testid="reason-input" placeholder="请说明申请原因" rows="3"></textarea>
    </div>

    <div class="form-group checkbox-group">
      <input type="checkbox" id="urgent-checkbox" data-testid="urgent-checkbox">
      <label for="urgent-checkbox">加急申请</label>
    </div>

    <button
      role="button"
      data-testid="submit-btn"
      onclick="submitForm()"
    >提交申请</button>
  </div>

  <div id="result"></div>

  <div id="workflow-section" style="display:none; margin-top: 24px;">
    <h2>申请详情</h2>
    <p>申请ID: <span id="workflow-id" data-testid="workflow-id"></span></p>
    <p>
      当前状态:
      <span id="workflow-status" class="status-badge pending" data-state="pending" data-testid="workflow-status">
        待审批
      </span>
    </p>
    <p>标题: <span id="detail-title" data-testid="detail-title"></span></p>
    <p>金额: <span id="detail-amount" data-testid="detail-amount"></span></p>
    <p>加急: <span id="detail-urgent" data-testid="detail-urgent"></span></p>

    <button role="button" data-testid="approve-btn" onclick="approveWorkflow()">审批通过</button>
  </div>

  <script>
    function generateId() {
      return 'wf-' + Math.random().toString(36).slice(2, 10);
    }

    function submitForm() {
      const title = document.getElementById('title-input').value;
      const amount = document.getElementById('amount-input').value;
      const reason = document.getElementById('reason-input').value;
      const urgent = document.getElementById('urgent-checkbox').checked;

      if (!title || !amount) {
        showResult('请填写必填项：申请标题和申请金额', false);
        return;
      }

      const id = generateId();
      document.getElementById('workflow-id').textContent = id;
      document.getElementById('detail-title').textContent = title;
      document.getElementById('detail-amount').textContent = amount;
      document.getElementById('detail-urgent').textContent = urgent ? '是' : '否';

      document.getElementById('form-section').style.display = 'none';
      document.getElementById('workflow-section').style.display = 'block';
      showResult('申请已提交', true);

      // 更新 URL（模拟跳转）
      history.pushState({}, '', '/workflow/' + id);
    }

    function approveWorkflow() {
      const badge = document.getElementById('workflow-status');
      badge.textContent = '已审批';
      badge.className = 'status-badge approved';
      badge.setAttribute('data-state', 'approved');
      badge.setAttribute('data-testid', 'workflow-status');
      showResult('审批完成', true);
    }

    function showResult(msg, success) {
      const el = document.getElementById('result');
      el.textContent = msg;
      el.className = 'result ' + (success ? 'success' : 'error');
      el.style.display = 'block';
    }

    function triggerNearResult(val) {
      document.getElementById('near-result').textContent = val;
    }
    function showTestModal() {
      document.getElementById('test-modal').style.display = 'flex';
    }
    function closeTestModal() {
      document.getElementById('test-modal').style.display = 'none';
    }
  </script>

  <!-- Near modifier test section -->
  <div id="near-test-section" style="margin-top: 40px; padding-top: 20px; border-top: 2px dashed #ccc;">
    <h2>Near 方案测试</h2>
    
    <!-- 1. basic & dual anchor & direction test -->
    <div id="grid-test" style="margin-bottom: 20px;">
      <div class="row" data-row="zhangsan">
        <span class="label">张三</span>
        <button class="near-btn" onclick="triggerNearResult('张三 - 删除')">删除</button>
        <button class="near-btn" onclick="triggerNearResult('张三 - 编辑')">编辑</button>
      </div>
      <div class="row" data-row="lisi">
        <span class="label">李四</span>
        <button class="near-btn" onclick="triggerNearResult('李四 - 删除')">删除</button>
        <button class="near-btn" onclick="triggerNearResult('李四 - 编辑')">编辑</button>
      </div>
    </div>

    <!-- 2. direction-specific positioning around a central anchor -->
    <div style="position: relative; height: 180px; margin-bottom: 20px; border: 1px solid #eee;">
      <div id="center-anchor" style="position: absolute; left: 150px; top: 70px; width: 60px; height: 30px; background: #ddd; text-align: center; line-height: 30px;">中心</div>
      <!-- Right candidate -->
      <button class="dir-btn" style="position: absolute; left: 240px; top: 70px;" onclick="triggerNearResult('右边按钮')">目标</button>
      <!-- Left candidate -->
      <button class="dir-btn" style="position: absolute; left: 40px; top: 70px;" onclick="triggerNearResult('左边按钮')">目标</button>
      <!-- Top candidate -->
      <button class="dir-btn" style="position: absolute; left: 150px; top: 15px;" onclick="triggerNearResult('上边按钮')">目标</button>
      <!-- Bottom candidate -->
      <button class="dir-btn" style="position: absolute; left: 150px; top: 125px;" onclick="triggerNearResult('下边按钮')">目标</button>
    </div>

    <!-- 3. modal coverage reachability test -->
    <div>
      <button id="bg-confirm-btn" style="margin-right: 10px;" onclick="triggerNearResult('背景确认')">确认</button>
      <button id="open-modal-btn" onclick="showTestModal()">打开Modal</button>
    </div>

    <div id="test-modal" style="display: none; position: fixed; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
      <div style="background: white; padding: 20px; border-radius: 8px; position: relative;">
        <h3>Modal 表单</h3>
        <label for="modal-input">用户名</label>
        <input id="modal-input" type="text" placeholder="输入用户名" style="margin-bottom: 10px;">
        <button id="modal-confirm-btn" onclick="triggerNearResult('Modal确认')">确认</button>
        <button id="close-modal-btn" onclick="closeTestModal()">关闭</button>
      </div>
    </div>

    <!-- 4. slash / in locator test -->
    <div id="slash-test-section" style="margin-top: 20px; padding-top: 10px; border-top: 1px dashed #eee;">
      <h3>斜杠定位器测试</h3>
      <input id="slash-input-1" type="text" placeholder="please user by name/id" oninput="triggerNearResult('输入了第一个: ' + this.value)">
      <input id="slash-input-2" type="text" placeholder="please user by name/id" oninput="triggerNearResult('输入了第二个: ' + this.value)">
      <button class="slash-btn" onclick="triggerNearResult('点击了第一个按钮')">name/id</button>
      <button class="slash-btn" onclick="triggerNearResult('点击了第二个按钮')">name/id</button>
    </div>

    <div id="near-result" style="margin-top: 10px; font-weight: bold; color: blue;"></div>
  </div>
</body>
</html>
