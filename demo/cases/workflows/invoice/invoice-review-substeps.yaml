# demo/cases/invoice-review-substeps.yaml
# 进阶示例：带子步骤（sub_steps）的发票审核流程

name: "发票审核全流程"
description: "含子步骤的发票上传与多级审核，演示 SubStep 断点续跑"
timeout: 480000

# 全局默认失败重试配置，该 Case 下所有 Steps 和 SubSteps 均默认继承
on_failure:
  strategy: retry
  max_retries: 2
  restore_snapshot: true

roles:
  submitter: { username: "submitter@co.com", password: "sub_pass" }
  reviewer:  { username: "reviewer@co.com",  password: "rev_pass" }

steps:
  - id: step1_upload_invoice
    role: submitter
    sub_steps:
      - id: fill_basic_info
        script: |
          open "http://127.0.0.1:61775/invoice/new"
          input "2024年Q3差旅报销" to "label:发票标题"
          input "12580" to "label:金额"
          input "差旅费" to "label:费用类型"

      - id: upload_files
        snapshot_before_submit: true
        script: |
          upload "./fixtures/invoice_001.pdf"
          assert_exists "上传成功" 15s
          upload "./fixtures/invoice_002.pdf"
          assert_exists "上传成功" 15s

      - id: submit_invoice
        snapshot_before_submit: true
        script: |
          tap "role:button[提交审核]"
          assert_exists "提交成功" 10s
          $invoice_url = current_url
          $invoice_id  = url_match "/invoice/([\w-]+)"
          screenshot

  - id: step2_review
    role: reviewer
    script: |
      open "$invoice_url"

      $res = do_get "http://127.0.0.1:61775/api/invoice/$invoice_id"
      assert_text_equal "$res.data.status" "pending_review"
      assert_text_equal "$res.data.amount" "12580"

      input "金额核实无误，同意报销" to "label:审核意见"
      tap "role:button[审核通过]"
      assert_exists "审核完成" 10s
      screenshot

  - id: step3_verify_final
    role: reviewer
    script: |
      open "$invoice_url"
      assert_exists "已审核通过" 5s
      $final = ".invoice-status"
      assert_text_equal "$final" "已审核通过"
      ? assert_exists "*已入账*" 3s
      screenshot
