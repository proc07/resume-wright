<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Checklist 动态表单系统</title>
  <style>
    :root {
      --bg-dark: #0f172a;
      --card-bg: #1e293b;
      --border-color: #334155;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --primary-color: #6366f1;
      --primary-hover: #4f46e5;
      --success-color: #10b981;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 36px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5), 0 10px 10px -5px rgba(0, 0, 0, 0.5);
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .subtitle {
      font-size: 13.5px;
      color: var(--text-secondary);
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type=text] {
      width: 100%;
      padding: 12px 16px;
      background: #0f172a;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 14.5px;
      transition: all 0.15s ease;
    }

    input[type=text]:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }

    .btn {
      width: 100%;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      transition: all 0.15s ease;
      margin-top: 10px;
    }

    .btn-primary {
      background: var(--primary-color);
      color: white;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    /* Result area */
    .result-panel {
      margin-top: 28px;
      padding-top: 24px;
      border-top: 1px dashed var(--border-color);
    }

    .result-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--success-color);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .result-item {
      font-size: 13.5px;
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .result-item span:first-child {
      color: var(--text-secondary);
    }
    
    .result-item span:last-child {
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2 id="checklist-heading">Checklist 动态核对表单</h2>
    <div class="subtitle">表单结构与初始数据将通过异步接口（GET）动态获取。</div>

    <form id="checklist-form" onsubmit="submitForm(event)">
      <div id="dynamic-fields-container">
        <!-- Fields generated dynamically -->
        <p style="color: var(--text-secondary); font-size: 14px;">正在载入动态表单结构...</p>
      </div>

      <button type="submit" class="btn btn-primary" id="btn-submit">提交表单数据</button>
    </form>

    <!-- Success Area (displayed only when processdata contains values) -->
    <div id="result-panel" class="result-panel" style="display: none;">
      <div class="result-title">✔ 提交完成 (服务端保存的数据详情)：</div>
      <div id="result-items-container"></div>
    </div>
  </div>

  <script>
    const formContainer = document.getElementById('dynamic-fields-container');
    const resultPanel = document.getElementById('result-panel');
    const resultContainer = document.getElementById('result-items-container');

    // 载入并生成表单
    async function loadForm() {
      try {
        // 1. 获取表单结构
        const structureRes = await fetch('/api/form');
        const fields = await structureRes.json();

        // 2. 获取表单数据
        const dataRes = await fetch('/api/form/processdata');
        const { data } = await dataRes.json();

        // 渲染表单项
        formContainer.innerHTML = '';
        fields.forEach(field => {
          const group = document.createElement('div');
          group.className = 'form-group';
          
          const label = document.createElement('label');
          label.setAttribute('for', field.id);
          label.textContent = field.label;

          const input = document.createElement('input');
          input.type = 'text';
          input.id = field.id;
          input.name = field.id;
          input.placeholder = `请输入${field.label}`;
          
          // 回填数据值
          input.value = data[field.id] || '';

          group.appendChild(label);
          group.appendChild(input);
          formContainer.appendChild(group);
        });

        // 判断是否已经有提交的数据，若有，则展示结果区域
        const hasData = Object.values(data).some(val => val !== '');
        if (hasData) {
          resultPanel.style.display = 'block';
          resultContainer.innerHTML = '';
          fields.forEach(field => {
            const item = document.createElement('div');
            item.className = 'result-item';
            
            const labelSpan = document.createElement('span');
            labelSpan.textContent = field.label + ':';
            
            const valueSpan = document.createElement('span');
            valueSpan.id = 'result-' + field.id;
            valueSpan.textContent = data[field.id] || '无';

            item.appendChild(labelSpan);
            item.appendChild(valueSpan);
            resultContainer.appendChild(item);
          });
        } else {
          resultPanel.style.display = 'none';
        }
      } catch (err) {
        console.error('加载表单失败:', err);
      }
    }

    // 提交数据
    async function submitForm(event) {
      event.preventDefault();
      
      const formData = {};
      const inputs = formContainer.querySelectorAll('input');
      inputs.forEach(input => {
        formData[input.id] = input.value;
      });

      try {
        const response = await fetch('/api/form/submit', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(formData)
        });

        if (response.ok) {
          // 提交成功后重新拉取表单与数据以刷新界面并二次校验
          await loadForm();
        }
      } catch (err) {
        console.error('提交失败:', err);
      }
    }

    // 初始化加载
    window.addEventListener('DOMContentLoaded', loadForm);
  </script>
</body>
</html>
